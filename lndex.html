<!DOCTYPE html>
<html>
<head>
    <base href="./">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayStation Pulse PSFree Host 9.00</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 25%, #2d2d5f 50%, #1a1a3e 75%, #0f0f23 100%);
            background-attachment: fixed;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #ffffff;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        
        .bg-decoration {
            position: fixed;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
            pointer-events: none;
        }
        
        .floating-shape {
            position: absolute;
            opacity: 0.08;
            animation: float 25s infinite linear;
        }
        
        .shape-1 {
            width: 120px;
            height: 120px;
            background: linear-gradient(45deg, #8b5cf6, #ec4899);
            border-radius: 50%;
            top: 15%;
            left: 8%;
            animation-delay: 0s;
        }
        
        .shape-2 {
            width: 80px;
            height: 80px;
            background: linear-gradient(45deg, #6366f1, #8b5cf6);
            border-radius: 30%;
            top: 70%;
            right: 12%;
            animation-delay: -8s;
        }
        
        .shape-3 {
            width: 100px;
            height: 100px;
            background: linear-gradient(45deg, #1BFACC, #56FFFF);
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            top: 45%;
            left: 85%;
            animation-delay: -15s;
        }
        
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); opacity: 0.08; }
            50% { transform: translateY(-30px) rotate(180deg); opacity: 0.12; }
            100% { transform: translateY(0px) rotate(360deg); opacity: 0.08; }
        }
        
        .container {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }
        
        .header-section {
            text-align: center;
            margin-bottom: 3rem;
        }
        
        .main-title {
            font-size: 4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }
        
        .subtitle {
            font-size: 1.5rem;
            color: #94a3b8;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }
        
        .version-info {
            font-size: 1.25rem;
            color: #10b981;
            font-weight: 600;
            margin-bottom: 2rem;
        }
        
        .status-container {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 20px;
            padding: 3rem;
            margin-bottom: 3rem;
            text-align: center;
            max-width: 600px;
            width: 100%;
        }
        
        .status-message {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #e2e8f0;
        }
        
        .status-highlight {
            color: #ef4444;
            text-shadow: 0 0 20px rgba(239, 68, 68, 0.5);
        }
        
        .jailbreak-status {
            font-size: 1.2rem;
            color: #94a3b8;
            margin-top: 1rem;
        }
        
        .console-container {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            max-width: 800px;
            width: 100%;
            min-height: 120px;
            font-family: 'Courier New', monospace;
        }
        
        #console {
            color: #10b981;
            font-size: 0.9rem;
            line-height: 1.4;
        }
        
        .stats-container {
            display: flex;
            gap: 2rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .stat-card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            min-width: 120px;
        }
        
        .stat-label {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
        }
        
        .stat-pass {
            color: #10b981;
        }
        
        .stat-fail {
            color: #ef4444;
        }
        
        .credits {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 25%, #2d2d5f  50%, #1a1a3e 75%, #0f0f23 100%);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(99, 102, 241, 0.2);
            padding: 1rem;
            text-align: center;
            font-size: 0.9rem;
            z-index: 10;
        }
        
        .credits-line {
            margin: 0.25rem 0;
        }
        
        .credit-label {
            color: #ffffff;
            font-weight: 500;
        }
        
        .credit-link {
            color: #ec4899;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }
        
        .credit-link:hover {
            color: #ff8fc7;
        }
        
        .telegram-link {
            color: #8b5cf6;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }
        
        .telegram-link:hover {
            color: #b595ff;
        }
        
        button:-moz-focus-inner, 
        button:focus {
            outline: 0;
            border: none;
        }
        
        button {
            font-family: 'Inter', sans-serif;
            font-size: 1.1rem;
            text-transform: uppercase;
            font-weight: 600;
            border: 2px solid rgba(99, 102, 241, 0.5);
            border-radius: 12px;
            padding: 1rem 2rem;
            cursor: pointer;
            display: inline-block;
            text-decoration: none;
            background: rgba(30, 41, 59, 0.4);
            color: #e2e8f0;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.2);
        }
        
        button:hover {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: 2px solid #ffffff;
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
            color: #ffffff;
            transform: translateY(-2px);
        }
        
        button:active {
            background: linear-gradient(135deg, #ef4444, #f97316);
            transform: translateY(0px);
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
            color: #ffffff;
        }
        
        @media (max-width: 768px) {
            .main-title {
                font-size: 2.5rem;
            }
            
            .status-message {
                font-size: 1.8rem;
            }
            
            .container {
                padding: 1rem;
            }
            
            .status-container {
                padding: 2rem;
            }
            
            .stats-container {
                gap: 1rem;
            }
            
            .credits {
                font-size: 0.8rem;
            }
        }
    </style>
    <script src="loader.js"></script>
    <script type="module" src="alert.js"></script>
    <script>
        function showMessage(msg) {
            document.getElementById("message").innerHTML = msg;
        }
    </script>
</head>
<body>
    <div class="bg-decoration">
        <div class="floating-shape shape-1"></div>
        <div class="floating-shape shape-2"></div>
        <div class="floating-shape shape-3"></div>
    </div>
    
    <div class="container">
        <div class="header-section">
            <h1 class="main-title">PlayStation Pulse PSFree Host 9.00</h1>
            <p class="subtitle">Online and Offline by Telegram PlayStation Pulse</p>
            <p class="version-info">GoldHEN FW v9.00</p>
        </div>
        
        <div class="status-container">
            <div class="status-message" id="message">
                Jailbreaking. Please, <span class="status-highlight">WAIT!!!</span>
            </div>
            <div class="jailbreak-status">Initializing exploitation process...</div>
        </div>
        
        <div class="console-container">
            <div id="console"></div>
        </div>
        
        <div class="stats-container">
            <div class="stat-card">
                <div class="stat-label">Success</div>
                <div class="stat-value stat-pass" id="passCounter">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Failed</div>
                <div class="stat-value stat-fail" id="failCounter">0</div>
            </div>
        </div>
    </div>
    
    <div class="credits">
        <div class="credits-line">
            <span class="credit-label">Author</span> 
            <a href="https://t.me/sudoBlackArch" class="telegram-link">BlackArch</a>
            <span style="margin: 0 1rem;">•</span>
            <span class="credit-label">Telegram</span> 
            <a href="https://t.me/PlayStation_Puls" class="credit-link">PlayStation Pulse</a>
        </div>
    </div>

    <script>
        if (localStorage.passcount == null || localStorage.passcount == undefined) localStorage.passcount = 0;
        if (localStorage.passCounter == null || localStorage.passCounter == undefined) {
            document.getElementById('passCounter').innerHTML = localStorage.passcount;
        }
        if (localStorage.failcount == null || localStorage.failcount == undefined) localStorage.failcount = 0;
        if (localStorage.failCounter == null || localStorage.failCounter == undefined) {
            document.getElementById('failCounter').innerHTML = localStorage.failcount;
        }
    </script>
</body>
</html>
